services:
  - type: web
    name: espolon
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SPREADSHEET_ID
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: GOOGLE_CREDENTIALS
        sync: false
